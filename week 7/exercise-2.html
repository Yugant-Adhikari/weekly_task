<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Test</title>
</head>
<body>


<form>
<table border="1" cellpadding="15" cellspacing="0">

    <tr>
        <td><h2>HTML Form Test</h2>
            <table cellpadding="8">
                <tr>
                    <td>Name</td>
                    <td><input type="text" name="name"></td>
                </tr>

                <tr>
                    <td>Address</td>
                    <td><input type="text" name="address"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="email" name="email"></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender"> Female
                    </td>
                </tr>

                <tr>
                    <td>Hobbies</td>
                    <td>
                        <input type="checkbox" name="hobby"> Sports
                        <input type="checkbox" name="hobby"> Movies
                        <input type="checkbox" name="hobby"> Travelling
                    </td>
                </tr>

                <tr>
                    <td>Country</td>
                    <td>
                        <select name="country">
                            <option>Nepal</option>
                            <option>India</option>
                            <option>China</option>
                            <option>USA</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td valign="top">Message</td>
                    <td>
                        <textarea rows="10" cols="40"></textarea>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</form>

</body>
</html>
