<!DOCTYPE html>
<html lang="en">
<head>
    <title>Array Add and Display</title>
</head>
<body>

    <!-- Input and Buttons -->
    <input type="text" id="text1"></input>
    <input type="button" id="button1" value="Add" onclick="add_element_to_array();"></input>
    <input type="button" id="button2" value="Display" onclick="display_array();"></input>

    <!-- Result Area -->
    <div id="Result"></div>

    <script>
        // 1. Initialize variables
        var x = 0;
        var array = Array();

        // 2. Function to add items to the array
        function add_element_to_array() {
            // Get value from input
            array[x] = document.getElementById("text1").value;
            
            // Show alert and increment index
            alert("Element: " + array[x] + " Added at index " + x);
            x++;
            
            // Clear input box for next entry
            document.getElementById("text1").value = "";
        }

        // 3. Function to display array elements
        function display_array() {
            var e = "<hr/>"; // Horizontal line for separation

            for (var y = 0; y < array.length; y++) {
                e += "Element " + y + " = " + array[y] + "<br/>";
            }

            // Output the final string to the Result div
            document.getElementById("Result").innerHTML = e;
        }
    </script>

</body>
</html>
