<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 330px; /* slightly increased */
  border: 3px solid #d6d6a8;
  background: #f5f5dc;
}

/* Common cell */
.cell {
  position: absolute;
  border: 1px solid black;
  box-sizing: border-box;
  padding: 10px;
  font-size: 14px;
}

/* Header */
.h1 { top: 0; left: 0; width: 110px; height: 40px; text-align: center; font-weight: bold; background: #eee; }
.h2 { top: 0; left: 112px; width: 110px; height: 40px; text-align: center; font-weight: bold; background: #eee; }
.h3 { top: 0; left: 224px; width: 110px; height: 40px; text-align: center; font-weight: bold; background: #eee; }

/* Column 1 FIXED */
.col1 {
  top: 42px;
  left: 0;
  width: 110px;
  height: 220px;
  background: #9bbbc6;
  padding: 12px;
}

/* B */
.col2top {
  top: 42px;
  left: 112px;
  width: 110px;
  height: 40px;
  background: yellow;
  text-align: right;
  font-weight: lighter;
}

/* C */
.col3top {
  top: 42px;
  left: 224px;
  width: 110px;
  height: 40px;
  background: red;
  text-align: right;
  font-weight:lighter;
  color: black;
}

/* Bottom merged */
.bottom {
  top: 84px;
  left: 112px;
  width: 222px;
  height: 178px;
  background: green;
  color: black;
}

/* Better list spacing */
ol {
  margin: 8px 0 0 18px;
  padding: 0;
}

ul {
  margin: 8px 0 0 18px;
}
</style>
</head>

<body>

<div class="container">

  <div class="cell h1">Column 1</div>
  <div class="cell h2">Column 2</div>
  <div class="cell h3">Column 3</div>

  <div class="cell col1">
    <p><b>A numbered list:</b></p>
    <ol>
      <li>Able</li>
      <li>Baker</li>
      <li>Charlie</li>
      <li>Delta</li>
      <li>Echo</li>
    </ol>
  </div>

  <div class="cell col2top">B</div>
  <div class="cell col3top">C</div>

  <div class="cell bottom">
    <p><b>An unnumbered list:</b></p>
    <ul>
      <li>Pounds</li>
      <li>Dollars</li>
      <li>Euro</li>
      <li>Yen</li>
      <li>Roubles</li>
    </ul>
  </div>

</div>

</body>
</html>
